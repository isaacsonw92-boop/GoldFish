    2026年2月28日美以联合空袭伊朗（Operation Epic Fury），
    伊朗报复性封锁霍尔木兹海峡，油价暴涨，全球risk-off。
    与924场景完全不同：这是地缘黑天鹅冲击，不是政策利好。
  start_date: "2026-02-27"
  end_date: "2026-03-11"

initial_market:
  hsi_close: 26630
  daily_volume_hkd_billion: 150
  sentiment: "cautious"
  foreign_positioning: "neutral_to_slight_overweight"
  hedge_fund_short_interest: "moderate"
  southbound_flow_trend: "steady_inflow"
  context: |
    2月恒指累计跌2.8%，主因AI行业波动和宏观不确定性。
    DeepSeek引发的AI热潮已降温。市场情绪偏谨慎。
    布伦特原油约$70-72/桶。中东局势紧张但未失控。

