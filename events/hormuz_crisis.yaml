# 回溯验证的标准答案
expected_behavior:
  key_difference_from_924: |
    924是政策利好→"四种怕"驱动追涨。
    这次是地缘黑天鹅→"一种怕"压倒一切：怕不确定性（fear of the unknown）。
    所有Agent的反应方向相同（减仓/避险），区别只在速度和幅度。

  reaction_order:
    - "对冲基金最先反应（周末期货/周一开盘第一时间做空或加仓避险）"
    - "长线外资开始系统性减配新兴市场（T+1~T+3，决策链快于924因为是risk-off标准流程）"
    - "南下资金前期观望→第二波暴跌时恐慌卖出"
    - "价值投资者在第二波暴跌后开始关注（但未必立即行动）"

  hedge_fund_behavior: |
    - 第一反应：做空港股期货+买入VIX+买入原油期货
    - 这是"教科书式"的地缘危机交易，对冲基金最擅长
    - 与924不同：924是被迫平仓（防守），这次是主动做空（进攻）

  long_only_behavior: |
    - 反应比924快！因为risk-off是标准操作流程，不需要配置委员会讨论
    - 减配新兴市场（不只是中国，是整个EM），增配美元现金和美债
    - 这次只需要1-2天就能行动（vs 924的3-7天）

  southbound_behavior: |
    - 前几天"抄底"心态（"跌了就是便宜"）
    - 第二波暴跌（3月9日黑色星期一）时恐慌卖出
    - 散户部分的"处置效应"在这里反转——地缘危机的恐惧压过了"扛一扛"的习惯

  value_investor_behavior: |
    - 前期完全不动（"这不影响公司的自由现金流"）
    - 如果跌幅达到15-20%，开始评估是否出现安全边际
    - 可能在3月9-10日开始试探性买入优质公司
    - "当别人因为地缘恐惧卖出好公司，就是我买入的时候"

  hsi_trajectory: "26,630 → 23,500~23,700（累计跌约11%）→ 试探性企稳"

  oil_trajectory: "$71 → $109（峰值+54%）→ 回落至$95附近"

  key_insight: |
    地缘冲击和政策冲击的本质区别：
    - 政策冲击：方向明确（利好/利空），Agent分化明显（有人买有人卖）
    - 地缘冲击：不确定性本身就是最大的敌人，Agent趋同（都在卖/避险）
    - 唯一的例外是对冲基金——他们在不确定性中看到赚钱机会
